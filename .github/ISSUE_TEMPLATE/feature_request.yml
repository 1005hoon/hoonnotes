name: "✨ 기능 요청"
description: "새로운 기능을 제안하려면 이 템플릿을 사용해주세요"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        새로운 기능을 제안해 주셔서 감사합니다! 아래 양식을 작성해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 관련 문제
      description: 이 기능이 어떤 문제를 해결하나요?
      placeholder: 현재 겪고 있는 불편함이나 문제점을 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떤 기능이 필요한지 구체적으로 설명해주세요.
      placeholder: 원하는 기능의 동작 방식을 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 해결 방법이 있나요?
      placeholder: 다른 방식으로 해결할 수 있는 방법을 적어주세요.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고할만한 문서, 스크린샷 등 추가 정보가 있다면 첨부해주세요.
